# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

name: test-coverage.yaml

permissions: read-all

jobs:
  test-coverage:
    if: >
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[run checks]') ||
      contains(github.event.pull_request.title, '[run checks]') ||
      contains(github.event.pull_request.body, '[run checks]')
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::covr, any::xml2
          needs: coverage

     - name: Test coverage
        env:
          RUN_STAN_TESTS: 'true'
        run: |
          # 1. Generate coverage, explicitly protecting the R-to-C++ linkers from crashing
          cov <- covr::package_coverage(
            type = "tests",
            quiet = TRUE,
            clean = FALSE,
            line_exclusions = c("R/stanmodels.R", "R/RcppExports.R"),
            install_path = file.path(normalizePath(Sys.getenv("RUNNER_TEMP")), "package")
          )

          # 2. Forcefully drop all C++ / compiled files from the final report
          cov <- covr::exclude(cov, "src/.*")

          print(cov)
          covr::to_cobertura(cov)
        shell: Rscript {0}

      - uses: codecov/codecov-action@v5
        with:
          # Fail if error if not on PR, or if on PR and token is given
          fail_ci_if_error: ${{ github.event_name != 'pull_request' || secrets.CODECOV_TOKEN }}
          files: ./cobertura.xml
          plugins: noop
          disable_search: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Show testthat output
        if: always()
        run: |
          ## --------------------------------------------------------------------
          find '${{ runner.temp }}/package' -name 'testthat.Rout*' -exec cat '{}' \; || true
        shell: bash

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-test-failures
          path: ${{ runner.temp }}/package
